name: Build and Push GPU Image to Docker Hub

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      image_name:
        description: Docker Hub image name, including namespace
        required: true
        default: liudunxu/omnivoice-api
      tag:
        description: Image tag
        required: true
        default: vast-gpu
      dockerfile:
        description: Dockerfile to build
        required: true
        default: docker/Dockerfile.vast

jobs:
  docker-hub-gpu:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve build parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "image_name=${{ inputs.image_name }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "dockerfile=${{ inputs.dockerfile }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_name=liudunxu/omnivoice-api" >> "$GITHUB_OUTPUT"
            echo "tag=vast-gpu" >> "$GITHUB_OUTPUT"
            echo "dockerfile=docker/Dockerfile.vast" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.params.outputs.image_name }}
          tags: |
            type=raw,value=${{ steps.params.outputs.tag }}
            type=sha,prefix=${{ steps.params.outputs.tag }}-
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}

      - name: Build and push GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.params.outputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
